services:

  # ── Nginx: static frontend + reverse proxy ────────
  nginx:
    build:
      context: ..                          # project root (COPY frontend/ needs it)
      dockerfile: deploy/Dockerfile.frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  # ── FastAPI agent backend ──────────────────────────
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    # 4 workers is right for a 4-vCPU VM.
    # Each worker handles SSE concurrently via asyncio;
    # SQLite (WAL mode) handles concurrent access across workers fine.
    command: >
      gunicorn api:app
        --worker-class uvicorn.workers.UvicornWorker
        --workers 4
        --bind 0.0.0.0:8001
        --timeout 300
        --keep-alive 5
        --graceful-timeout 30
    env_file: ../.env
    environment:
      - EMBEDDING_SERVICE_URL=http://embedding-service:8000/embed
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - papers:/app/data/papers
      - indexes:/app/data
    depends_on:
      - embedding-service
      - redis
    restart: unless-stopped

  # ── Redis cache ───────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    volumes:
      - redis-data:/data

  # ── PubMedBERT embedding microservice ─────────────
  embedding-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.embedding
    environment:
      - EMBEDDING_PORT=8000
    volumes:
      - model-cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  papers:
  indexes:
  model-cache:
  redis-data:
