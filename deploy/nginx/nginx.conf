worker_processes auto;
events { worker_connections 2048; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml;

    upstream api {
        server api:8001;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ── Static frontend ──────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── API (regular JSON endpoints) ─────────────────
        location /api/ {
            proxy_pass         http://api/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── SSE streaming  (/api/chat) ────────────────────
        # SSE needs buffering OFF and a long read timeout.
        location /api/chat {
            proxy_pass             http://api/api/chat;
            proxy_http_version     1.1;
            proxy_set_header       Connection '';        # keep-alive to upstream
            proxy_set_header       Host $host;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_set_header       Cache-Control no-cache;
            proxy_buffering        off;                  # critical for SSE
            proxy_cache            off;
            proxy_read_timeout     300s;                 # allow long agent runs
            proxy_connect_timeout  10s;
            chunked_transfer_encoding on;
        }
    }
}
