# =============================================================================
# Secret - Sensitive configuration (API keys)
# =============================================================================
# IMPORTANT: In production, use sealed-secrets, external-secrets, or vault
# Do NOT commit actual secrets to git. This is a template.
apiVersion: v1
kind: Secret
metadata:
  name: protein-rag-secrets
  namespace: protein-rag
  labels:
    app.kubernetes.io/name: protein-rag
type: Opaque
stringData:
  # Pinecone API key (replace with actual value or inject via external-secrets)
  PINECONE_API_KEY: "YOUR_PINECONE_API_KEY_HERE"
  
  # Zenmux/OpenAI API key for LLM access
  ZENMUX_API_KEY: "YOUR_ZENMUX_API_KEY_HERE"
  ZENMUX_BASE_URL: "https://api.zenmux.com/v1"
